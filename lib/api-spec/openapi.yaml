openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CareForm AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patient
    description: Patient intake operations
  - name: codes
    description: Access code operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /patient/{id}:
    get:
      operationId: getPatient
      tags: [patient]
      summary: Get patient intake
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient intake data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updatePatient
      tags: [patient]
      summary: Update patient intake
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "200":
          description: Updated patient intake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patient/{id}/pass:
    get:
      operationId: getActivePass
      tags: [patient]
      summary: Get the current active (non-expired, non-revoked) pass for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active pass
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivePass"
        "404":
          description: No active pass
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patient/{id}/access-history:
    get:
      operationId: getAccessHistory
      tags: [patient]
      summary: Get the access history for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access history entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessHistoryList"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes:
    post:
      operationId: createCode
      tags: [codes]
      summary: Generate a 6-digit access code for a patient (revokes any existing active code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeRequest"
      responses:
        "201":
          description: Access code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivePass"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /codes/{code}:
    get:
      operationId: validateCode
      tags: [codes]
      summary: Validate a 6-digit access code and return patient intake (logs the view)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient intake data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeValidationResult"
        "404":
          description: Code not found, expired, or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: revokeCode
      tags: [codes]
      summary: Revoke an active access code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Code revoked
        "404":
          description: Code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        errorCode:
          type: string
      required:
        - error
        - errorCode

    Allergy:
      type: object
      properties:
        name:
          type: string
        reaction:
          type: string
        severity:
          type: string
      required:
        - name
        - reaction
        - severity

    Medication:
      type: object
      properties:
        name:
          type: string
        dose:
          type: string
        frequency:
          type: string
        route:
          type: string
        prescriber:
          type: string
        reason:
          type: string
      required:
        - name
        - dose
        - frequency
        - route
        - prescriber
        - reason

    Condition:
      type: object
      properties:
        name:
          type: string
        diagnosedDate:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - name
        - diagnosedDate
        - status
        - notes

    Surgery:
      type: object
      properties:
        procedure:
          type: string
        date:
          type: ["string", "null"]
        facility:
          type: ["string", "null"]
      required:
        - procedure
        - date
        - facility

    Immunization:
      type: object
      properties:
        vaccine:
          type: string
        date:
          type: string
      required:
        - vaccine
        - date

    FamilyHistoryEntry:
      type: object
      properties:
        relation:
          type: string
        condition:
          type: string
      required:
        - relation
        - condition

    SocialHistory:
      type: object
      properties:
        smoking:
          type: string
        alcohol:
          type: string
        occupation:
          type: string
        exercise:
          type: string
      required:
        - smoking
        - alcohol
        - occupation
        - exercise

    CareTeam:
      type: object
      properties:
        pcp:
          type: string
        referringPhysician:
          type: string
        visitSpecialty:
          type: string
        reasonForVisit:
          type: string
        preferredPharmacy:
          type: string
        pharmacyPhone:
          type: string
      required:
        - pcp
        - referringPhysician
        - visitSpecialty
        - reasonForVisit
        - preferredPharmacy
        - pharmacyPhone

    Insurance:
      type: object
      properties:
        plan:
          type: string
        memberId:
          type: string
        group:
          type: string
        policyholder:
          type: string
        phone:
          type: string
      required:
        - plan
        - memberId
        - group
        - policyholder
        - phone

    EmergencyContact:
      type: object
      properties:
        name:
          type: string
        relationship:
          type: string
        phone:
          type: string
      required:
        - name
        - relationship
        - phone

    Vitals:
      type: object
      properties:
        heightFt:
          type: string
        heightIn:
          type: string
        weightLbs:
          type: string
        systolic:
          type: string
        diastolic:
          type: string
      required:
        - heightFt
        - heightIn
        - weightLbs
        - systolic
        - diastolic

    Patient:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        biologicalSex:
          type: string
        genderIdentity:
          type: string
        preferredLanguage:
          type: string
        maritalStatus:
          type: string
        bloodType:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        careTeam:
          $ref: "#/components/schemas/CareTeam"
        insurance:
          $ref: "#/components/schemas/Insurance"
        insuranceSecondary:
          oneOf:
            - $ref: "#/components/schemas/Insurance"
            - type: "null"
        emergencyContact:
          $ref: "#/components/schemas/EmergencyContact"
        allergies:
          type: array
          items:
            $ref: "#/components/schemas/Allergy"
        medications:
          type: array
          items:
            $ref: "#/components/schemas/Medication"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
        surgeries:
          type: array
          items:
            $ref: "#/components/schemas/Surgery"
        immunizations:
          type: array
          items:
            $ref: "#/components/schemas/Immunization"
        familyHistory:
          type: array
          items:
            $ref: "#/components/schemas/FamilyHistoryEntry"
        socialHistory:
          $ref: "#/components/schemas/SocialHistory"
        vitals:
          $ref: "#/components/schemas/Vitals"
        updatedAt:
          type: string
      required:
        - id
        - firstName
        - lastName
        - dateOfBirth
        - biologicalSex
        - genderIdentity
        - preferredLanguage
        - maritalStatus
        - bloodType
        - phone
        - email
        - address
        - careTeam
        - insurance
        - insuranceSecondary
        - emergencyContact
        - allergies
        - medications
        - conditions
        - surgeries
        - immunizations
        - familyHistory
        - socialHistory
        - vitals
        - updatedAt

    PatientInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        biologicalSex:
          type: string
        genderIdentity:
          type: string
        preferredLanguage:
          type: string
        maritalStatus:
          type: string
        bloodType:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        careTeam:
          $ref: "#/components/schemas/CareTeam"
        insurance:
          $ref: "#/components/schemas/Insurance"
        insuranceSecondary:
          oneOf:
            - $ref: "#/components/schemas/Insurance"
            - type: "null"
        emergencyContact:
          $ref: "#/components/schemas/EmergencyContact"
        allergies:
          type: array
          items:
            $ref: "#/components/schemas/Allergy"
        medications:
          type: array
          items:
            $ref: "#/components/schemas/Medication"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
        surgeries:
          type: array
          items:
            $ref: "#/components/schemas/Surgery"
        immunizations:
          type: array
          items:
            $ref: "#/components/schemas/Immunization"
        familyHistory:
          type: array
          items:
            $ref: "#/components/schemas/FamilyHistoryEntry"
        socialHistory:
          $ref: "#/components/schemas/SocialHistory"
        vitals:
          $ref: "#/components/schemas/Vitals"
      required:
        - firstName
        - lastName
        - dateOfBirth
        - biologicalSex
        - genderIdentity
        - preferredLanguage
        - maritalStatus
        - bloodType
        - phone
        - email
        - address
        - careTeam
        - insurance
        - insuranceSecondary
        - emergencyContact
        - allergies
        - medications
        - conditions
        - surgeries
        - immunizations
        - familyHistory
        - socialHistory
        - vitals

    CodeRequest:
      type: object
      properties:
        patientId:
          type: string
      required:
        - patientId

    ActivePass:
      type: object
      properties:
        code:
          type: string
        patientId:
          type: string
        expiresAt:
          type: string
        revokedAt:
          type: ["string", "null"]
      required:
        - code
        - patientId
        - expiresAt
        - revokedAt

    AccessHistoryEntry:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        patientId:
          type: string
        viewedAt:
          type: string
      required:
        - id
        - code
        - patientId
        - viewedAt

    AccessHistoryList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AccessHistoryEntry"
      required:
        - entries

    CodeValidationResult:
      type: object
      properties:
        patient:
          $ref: "#/components/schemas/Patient"
        expiresAt:
          type: string
      required:
        - patient
        - expiresAt
