kind = "web"
previewPath = "/"
title = "CareForm AI"
version = "1.0.0"
id = "artifacts/careform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18217

[services.development]
run = "pnpm --filter @workspace/careform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careform", "run", "build" ]
publicDir = "artifacts/careform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18217"
BASE_PATH = "/"
